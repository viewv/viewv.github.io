<header id="index-header">
    <div class="top-center">
        <div class="logo">
            <a href="{{ "/" | relative_url }}" title="my awesome webtitle">{{ site.webtitle }}</a>
        </div>
        <nav class="top-nav">
            <ul>
                {% for i in site.nav %}
                <li><a href="{{ i[1] }}">{{ i[0] }}</a></li>
                {% endfor %}
                <!-- HTML elements for search-->
                <div id="search-container">
                    <input type="text" id="search-input" placeholder="search...">
                    <ul id="results-container"></ul>
                </div>
                <!-- script pointing to jekyll-search.js-->
                <script src="/assets/js/simple-jekyll-search.min.js"></script>

                <script>
                    window.simpleJekyllSearch = new SimpleJekyllSearch({
                        searchInput: document.getElementById('search-input'),
                        resultsContainer: document.getElementById('results-container'),
                        json: '/search.json',
                        searchResultTemplate: '<li><a href="{url}" title="{desc}">{title}</a></li>',
                        noResultsText: 'No results found',
                        limit: 5,
                        fuzzy: false,
                        exclude: ['Welcome']
                    })
                </script>
            </ul>
        </nav>
        <div id="top-boot">
            <a href="javascript:;" id="boot1" style="display:block;" onclick="document.getElementById('boot-area').style.display='block';document.getElementById('boot1').style.display='none';document.getElementById('boot2').style.display='block';"><img
                    src="/assets/boot.png" alt=""></a>
            <a href="javascript:;" id="boot2" style="display: none;" onclick="document.getElementById('boot-area').style.display='none';document.getElementById('boot1').style.display='block';document.getElementById('boot2').style.display='none';"><img
                    src="/assets/boot.png" alt=""></a>
        </div>
    </div>

</header>
